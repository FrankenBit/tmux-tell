name: deploy

# Manual deploy to alcatraz via the dedicated host-mode Forgejo runner +
# /srv/scripts/deploy-tmux-tell.sh wrapper (alcatraz-infra #392). Operator
# triggers from the Forgejo Actions UI with an optional `ref` input to pin
# the deploy to a specific tag / commit. No automatic trigger by design —
# auto-deploy-on-push is a follow-up once the manual path is established
# (#394 release.yml chains here via repository_dispatch / workflow_call).
#
# Schema-compatibility notes (Forgejo Actions YAML schema, validated against
# git.frankenbit.de's instance at 2026-06-14): `gitea.*` is not accepted by
# the schema validator — use `github.*` (Forgejo aliases the namespace).
# `timeout-minutes` is not accepted as a job-level property. Top-level
# `concurrency:` block also tripped the schema validator and was dropped;
# wrapper-side flock on /run/lock/tmux-tell-deploy.lock provides the
# concurrency gate at the substrate-honest level. The wrapper uses
# `flock --nonblock` (fail-fast on contention per Lookout 2347), so a
# concurrent second deploy exits non-zero immediately with "another deploy
# is in progress" instead of queueing. The workflow run surfaces that as
# a failed job; operator-retry is the recovery path. Conservative-then-
# soften: if the fail-fast surfaces real coordination pain, switch to a
# blocking flock or re-add workflow-level concurrency at that point.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch / tag / commit to deploy (default: main)'
        required: false
        default: 'main'
        # Explicit type required by Forgejo Actions dispatch UI per #417
        # (operator-witnessed "Invalid input type ''" 2026-06-14).
        type: string
  # workflow_call entry point so release-publish.yml can chain the deploy
  # after a tag push creates the Forgejo release. Same `ref` input as the
  # workflow_dispatch trigger; release-publish.yml passes the tag name.
  # Closes the v0.17.0 cut automation loop (deferred from #394 / #406 as
  # release-publish.yml fast-follow; operator-greenlit 2026-06-14 evening).
  workflow_call:
    inputs:
      ref:
        description: 'Branch / tag / commit to deploy'
        required: true
        type: string

jobs:
  deploy:
    name: install + bootstrap on alcatraz
    runs-on: alcatraz-host
    steps:
      - name: checkout requested ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          # Full history so `git describe` in the Makefile picks up the
          # right tag for the version stamp (install.sh:155 builds via
          # `make bin/$BIN_NAME` which embeds `git describe --tags`).
          fetch-depth: 0

      - name: deploy state
        run: |
          set -euo pipefail
          echo "ref:        ${{ inputs.ref || github.ref_name }}"
          echo "workspace:  $GITHUB_WORKSPACE"
          echo "describe:   $(git describe --tags --always)"
          echo "head:       $(git rev-parse HEAD)"
          echo "origin:     $(git config --get remote.origin.url)"

      - name: deploy via wrapper (claude adapter, binary + mailman restart)
        # --system (#636): since the user-space install became the default,
        # alcatraz's system-wide deploy (root-owned binary in /usr/local/bin — the
        # existing deploy contract) must opt in explicitly, because install.sh now
        # REJECTS running as root without --system. PREREQUISITE: the alcatraz-infra
        # deploy-tmux-tell.sh argument allowlist must already permit --system, or
        # the wrapper rejects this arg before exec'ing install.sh. That allowlist
        # change must land BEFORE this ref deploys (see PR #636 cross-repo note).
        #
        # --no-bootstrap (#656): the runner has its own tmux context (or none at
        # all) — chambers live in alex's separate tmux server. bootstrap's step 3
        # (discover) + step 6 (refresh-all-mcps) both walk live tmux state, so
        # they can't see the chambers from here and fail. Symptom: v0.23.0 +
        # v0.24.0 + v0.24.1 all showed exit 70 at the refresh-all-mcps step even
        # though the binary installed correctly. install.sh's --no-bootstrap path
        # still runs restart-mailmen (the #436 load-bearing binary-effectiveness
        # step) + prints a "Next steps" block naming `tmux-tell-claude bootstrap`
        # as the operator-side follow-up to fire from their tmux session. Also
        # loses --prune-orphans on the runner path (bootstrap is where the
        # orphan walk lives); operator's manual bootstrap post-deploy picks it up.
        run: |
          sudo /srv/scripts/deploy-tmux-tell.sh \
            "$GITHUB_WORKSPACE" \
            --adapter=claude \
            --system \
            --no-bootstrap

      - name: deploy via wrapper (codex adapter, binary + mailman restart)
        # #436: the release builds BOTH adapter binaries, so the deploy must roll
        # both — claude-only left the codex binary a version behind every cut
        # (caught at v0.17.0). `--no-bootstrap`: same runner-context reason as
        # the claude step (#656) — the runner can't see chamber panes to fire
        # substrate-refresh, so it's deferred to the operator's manual
        # `tmux-tell-claude bootstrap --prune-orphans` post-deploy. No
        # `--prune-orphans` on either step here: orphan walk is bootstrap-only
        # and belongs on the operator's manual pass. The codex install path
        # restarts running codex mailmen via the restart-mailmen primitive, so
        # the new codex binary is EFFECTIVE (not just on disk) — the #393
        # effectiveness lesson applied to codex. The call omits
        # --allow-stale-mailmen, so a restart failure is FATAL: the step fails
        # loud rather than greening a stale-mailman state (Lookout #439 — the
        # post-deploy smoke's `--version` only proves file-on-disk).
        run: |
          sudo /srv/scripts/deploy-tmux-tell.sh \
            "$GITHUB_WORKSPACE" \
            --adapter=codex \
            --system \
            --no-bootstrap

      - name: post-deploy smoke
        # Doctor was hard-fail (Lookout 732d advisory + Bosun b2e9 architect-
        # call). First-deploy-lane empirically surfaced the false-positive
        # surface the inline comment named: every deploy replaces the
        # `tmux-tell-claude` inode, so chamber-side MCP servers that were
        # canonical before the deploy become stale immediately after.
        # `refresh-all-mcps` queues an MCP restart but only fires when the
        # chamber processes it (claude `/mcp` slash command on next prompt;
        # codex chambers can't act on it at all — see #411). With chambers
        # idle at deploy time the stale-MCP state persists, and `doctor`'s
        # `Divergent` flag (doctor.go:71) fires on any stale-binary process,
        # not just stale mailmen. Result: every workflow_dispatch fails on
        # doctor even when the deploy was structurally successful.
        #
        # Soften per the inline-documented conservative-then-soften
        # discipline pin: doctor still runs (its output is the substrate-
        # state truth + lands in the workflow log for postmortem), but
        # non-zero exits emit a `::warning::` rather than failing the job.
        # The substrate-honest closure of the underlying gap lives in
        # #411 (codex MCP-restart path) + #414 (codex paste-and-enter
        # prompt-readiness gate). With those closed, doctor can return
        # to hard-fail; the soften is a v0.17.0-lane discipline that
        # composes with the trackers.
        #
        # Install success (the wrapper step exiting 0) IS the load-bearing
        # deploy signal; doctor remains the substrate-state-truth surface
        # operators read from job logs to know which chambers need a
        # manual MCP refresh.
        run: |
          set -euo pipefail
          echo "==> installed binary versions (#436: assert BOTH adapters — a"
          echo "    silent per-adapter version lag is the gap this surfaces)"
          tmux-tell-claude --version
          tmux-tell-codex --version
          echo "==> doctor (MCP / mailman DB-binding divergence check, #348)"
          if ! tmux-tell-claude doctor; then
              echo "::warning::doctor reported divergence — review log for stale chamber MCPs (#411) or non-ready codex chambers (#414); deploy itself was structurally successful"
          fi
