name: deploy
run-name: deploy ${{ inputs.ref || gitea.ref_name }} to alcatraz

# Manual deploy to alcatraz via the dedicated host-mode Forgejo runner +
# /srv/scripts/deploy-tmux-tell.sh wrapper (alcatraz-infra #392). Operator
# triggers from the Forgejo Actions UI with an optional `ref` input to pin
# the deploy to a specific tag / commit. No automatic trigger by design —
# auto-deploy-on-push is a follow-up once the manual path is established
# (#394 release.yml chains here via repository_dispatch / workflow_call).

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch / tag / commit to deploy (default: main)'
        required: false
        default: 'main'

concurrency:
  # Belt-and-braces: workflow-level concurrency queues parallel triggers,
  # AND the wrapper's flock on /run/lock/tmux-tell-deploy.lock guards
  # direct invocations (runner restart, alex shell). Both layers matter.
  group: tmux-msg-deploy-alcatraz
  cancel-in-progress: false

jobs:
  deploy:
    name: install + bootstrap on alcatraz
    runs-on: alcatraz-host
    timeout-minutes: 10
    steps:
      - name: checkout requested ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          # Full history so `git describe` in the Makefile picks up the
          # right tag for the version stamp (install.sh:155 builds via
          # `make bin/$BIN_NAME` which embeds `git describe --tags`).
          fetch-depth: 0

      - name: deploy state
        run: |
          set -euo pipefail
          echo "ref:        ${{ inputs.ref || gitea.ref_name }}"
          echo "workspace:  $GITHUB_WORKSPACE"
          echo "describe:   $(git describe --tags --always)"
          echo "head:       $(git rev-parse HEAD)"
          echo "origin:     $(git config --get remote.origin.url)"

      - name: deploy via wrapper (claude adapter, bootstrap + prune orphans)
        run: |
          sudo /srv/scripts/deploy-tmux-tell.sh \
            "$GITHUB_WORKSPACE" \
            --adapter=claude \
            --prune-orphans

      - name: post-deploy smoke
        # Hard-fail on doctor divergence per Lookout 732d advisory: install
        # success (last step) and doctor-clean are orthogonal signals — install
        # = "binary deployed + bootstrap ran", doctor = "MCP/mailman DB-binding
        # has no divergence" (#348). The AC "doctor reports clean" requires
        # both, so the workflow must fail on doctor non-zero. First-deploy
        # lane is conservative; if false-positives surface (e.g. pre-existing
        # divergence from a disconnected chamber), soften to `|| true` with a
        # ::warning:: + named rationale at that point.
        run: |
          set -euo pipefail
          echo "==> installed binary version"
          tmux-msg-claude --version
          echo "==> doctor (MCP / mailman DB-binding divergence check, #348)"
          tmux-msg-claude doctor
