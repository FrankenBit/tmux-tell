name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: lint + build + test
    runs-on: go
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history required by check-changelog-placement's three-dot diff

      - name: go version
        run: go version

      - name: golangci-lint
        run: golangci-lint run --timeout=5m

      - name: go build
        run: go build ./...

      - name: go test
        # -race omitted in CI: the Forgejo runner image doesn't ship
        # cgo / a C compiler, which the race detector requires. Local
        # pre-commit should still use `go test -race -count=1 ./...`
        # — see README "Development" for the full pre-commit recipe.
        run: go test -count=1 ./...

      - name: scenarios (#264 — godog substrate-boundary E2E)
        # Run as a separate step so scenario failures are distinguishable
        # from unit-test failures in the CI summary. Features are also
        # included in the go test step above via ./...; this step names them.
        run: go test -count=1 ./features/steps/

      - name: check-pin-slugs (#51 — enforce ADR-0001 slug register)
        run: go run ./tools/check-pin-slugs/

      - name: check-changelog-fragments (#494 — validate changelog.d/ fragments)
        # Read-only: validates every changelog.d/<issue>.<type>.md fragment's
        # name + type + non-emptiness so a malformed fragment fails at PR time,
        # not at release-prep. Does NOT enforce fragment-presence per PR (that's
        # a CONTRIBUTING convention + reviewer check, like the legacy
        # CHANGELOG-entry rule it replaces).
        run: go run ./tools/changelog-assemble -check

      - name: check-changelog-placement (#471 — guard sealed-section injection)
        # On pull-request events, fails if any added line in CHANGELOG.md falls
        # under a sealed ## [X.Y.Z] section instead of ## [Unreleased]. This
        # catches the rebase-past-cut misplacement edge: a PR rebased over a
        # release cut shifts the diff anchor from [Unreleased] to the new sealed
        # section, silently injecting PR content into a published release record.
        #
        # Release-cut branches (i/v*) legitimately touch CHANGELOG.md; they are
        # skipped. On push-to-main the check is skipped too — that's the merge
        # commit and the gate already ran on the PR.
        if: ${{ github.event_name == 'pull_request' }}
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          if echo "$HEAD_REF" | grep -qE '^i/v[0-9]'; then
            echo "release-cut branch — changelog placement check skipped"
            exit 0
          fi
          go run ./tools/check-changelog-placement/ -base=origin/${{ github.base_ref }}
