name: test
run-name: test on ${{ gitea.ref }} (${{ gitea.event_name }})

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: go vet + build + test
    runs-on: go
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: go version
        run: go version

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test
        # -race omitted in CI: the Forgejo runner image doesn't ship
        # cgo / a C compiler, which the race detector requires. Local
        # pre-commit should still use `go test -race -count=1 ./...`
        # — see README "Development" for the full pre-commit recipe.
        run: go test -count=1 ./...

      - name: check-pin-slugs (#51 — enforce ADR-0001 slug register)
        run: go run ./tools/check-pin-slugs/
