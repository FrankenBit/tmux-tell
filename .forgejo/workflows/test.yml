name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: go vet + build + test
    runs-on: go
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: go version
        run: go version

      - name: gofmt
        run: |
          drift=$(gofmt -l .)
          if [ -n "$drift" ]; then
            echo "::error::gofmt drift detected. Run 'gofmt -w .' to fix."
            echo "$drift"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test
        # -race omitted in CI: the Forgejo runner image doesn't ship
        # cgo / a C compiler, which the race detector requires. Local
        # pre-commit should still use `go test -race -count=1 ./...`
        # — see README "Development" for the full pre-commit recipe.
        run: go test -count=1 ./...

      - name: scenarios (#264 — godog substrate-boundary E2E)
        # Run as a separate step so scenario failures are distinguishable
        # from unit-test failures in the CI summary. Features are also
        # included in the go test step above via ./...; this step names them.
        run: go test -count=1 ./features/steps/

      - name: check-pin-slugs (#51 — enforce ADR-0001 slug register)
        run: go run ./tools/check-pin-slugs/

      - name: check-changelog-fragments (#494 — validate changelog.d/ fragments)
        # Read-only: validates every changelog.d/<issue>.<type>.md fragment's
        # name + type + non-emptiness so a malformed fragment fails at PR time,
        # not at release-prep. Does NOT enforce fragment-presence per PR (that's
        # a CONTRIBUTING convention + reviewer check, like the legacy
        # CHANGELOG-entry rule it replaces).
        run: go run ./tools/changelog-assemble -check
