name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    # Manual re-run trigger for cases where the automatic pull_request /
    # push triggers didn't fire — e.g., release-toolkit's release-bot
    # pushes to release-prep/rolling using a system token that doesn't
    # trigger downstream workflows (Forgejo Actions anti-recursion
    # safeguard, same shape as GitHub Actions GITHUB_TOKEN rule).
    # Operator: Actions → test → Run workflow → pick branch → Run.
    inputs:
      reason:
        description: 'Why this manual dispatch (e.g. "release-bot push didn''t trigger CI on PR #630")'
        required: false
        default: ''
        type: string

jobs:
  test:
    name: lint + build + test
    runs-on: go
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history required by check-changelog-placement's three-dot diff

      - name: go version
        run: go version

      - name: golangci-lint
        run: golangci-lint run --timeout=5m

      - name: go build
        run: go build ./...

      - name: go test
        # -race omitted in CI: the Forgejo runner image doesn't ship
        # cgo / a C compiler, which the race detector requires. Local
        # pre-commit should still use `go test -race -count=1 ./...`
        # — see README "Development" for the full pre-commit recipe.
        run: go test -count=1 ./...

      - name: scenarios (#264 — godog substrate-boundary E2E)
        # Run as a separate step so scenario failures are distinguishable
        # from unit-test failures in the CI summary. Features are also
        # included in the go test step above via ./...; this step names them.
        run: go test -count=1 ./features/steps/

      - name: install.sh smoke tests (#349, #828)
        # Static/parse-level guards on install.sh: syntax, flag-parsing,
        # adapter-validation, and structural invariants (bootstrap dispatch,
        # observer restart-on-redeploy #828). The suite exits BEFORE the EUID /
        # systemd checks, so it needs no root, no sudo, and no systemd-user
        # session — safe on the containerless `go` runner. Previously only run
        # by hand; wired in with #828 so its regression guards actually gate.
        run: bash tests/install_smoke_test.sh

      - name: check-pin-slugs (#51 — enforce ADR-0001 slug register)
        run: go run ./tools/check-pin-slugs/

      - name: check-changelog-fragments (#494 — validate changelog.d/ fragments)
        # Read-only: validates every changelog.d/<issue>.<type>.md fragment's
        # name + type + non-emptiness so a malformed fragment fails at PR time,
        # not at release-prep. Does NOT enforce fragment-presence per PR (that's
        # a CONTRIBUTING convention + reviewer check, like the legacy
        # CHANGELOG-entry rule it replaces).
        run: go run ./tools/changelog-assemble -check

      - name: check-changelog-placement (#471 — guard sealed-section injection)
        # On pull-request events, fails if any added line in CHANGELOG.md falls
        # under a sealed ## [X.Y.Z] section instead of ## [Unreleased]. This
        # catches the rebase-past-cut misplacement edge: a PR rebased over a
        # release cut shifts the diff anchor from [Unreleased] to the new sealed
        # section, silently injecting PR content into a published release record.
        #
        # Release-cut branches legitimately touch CHANGELOG.md; they are
        # skipped. Three patterns covered:
        # - i/v[0-9]* (manual cuts via the legacy convention)
        # - release-prep/v[0-9]* (release.yml bot branch — #587 follow-up:
        #   the original regex only covered i/v*, breaking the v0.22.0 CI
        #   run)
        # - release-prep/rolling (release-toolkit's auto-opened rolling PR
        #   — added after #617 adopted release-toolkit and v0.23.0 became
        #   the first toolkit-driven cut on tmux-tell; the toolkit's branch
        #   name is the literal string "rolling", not "v{version}")
        # On push-to-main the check is skipped too — that's the merge
        # commit and the gate already ran on the PR.
        if: ${{ github.event_name == 'pull_request' }}
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          if echo "$HEAD_REF" | grep -qE '^(i/v[0-9]|release-prep/(v[0-9]|rolling))'; then
            echo "release-cut branch — changelog placement check skipped"
            exit 0
          fi
          go run ./tools/check-changelog-placement/ -base=origin/${{ github.base_ref }}
