name: release

# Consumer wrapper for frankenbit/release-toolkit (tmux-tell#617). Replaces the
# hand-rolled bump + CHANGELOG-transition + release-prep-PR machinery: a
# release-relevant push to main runs the toolkit's release-decide; a cut-worthy
# push opens/updates the rolling release-prep PR, and merging that PR cuts the
# release.
#
# publish_mode: draft preserves tmux-tell's operator-Publish gate (ADR-0003
# Gate-3): the cut creates a DRAFT release; the operator clicks Publish, Forgejo
# creates the tag and fires `release: published`, and release-publish.yml chains
# deploy.yml onto alcatraz-host (unchanged). Switching to immediate would
# auto-deploy on every rolling-PR merge - a safety regression, not a
# simplification (tmux-tell#617 D1).
#
# workflow_dispatch is retained as an emergency-cut fallback for
# substrate-critical paths (operator-approved belt-and-suspenders, #617 D2).
# On a push (no inputs) publish_mode falls back to draft.
on:
  push:
    branches: [main]
    paths-ignore: ['.release-toolkit-manifest.json']
  workflow_dispatch:
    inputs:
      bump_override:
        description: 'Override version bump (auto / patch / minor / major)'
        required: false
        default: 'auto'
        type: string
      dry_run:
        description: 'Preview only - skip remote writes, do not push or open PR'
        required: false
        default: 'false'
        type: string
      publish_mode:
        description: 'Publish mode (draft | immediate) - draft keeps the operator-Publish deploy gate'
        required: false
        default: 'draft'
        type: string

jobs:
  release:
    uses: frankenbit/release-toolkit/.forgejo/workflows/reusable-release.yml@v0.20.0-rc.2
    secrets: inherit
    with:
      runs_on:       go
      bump_override: ${{ inputs.bump_override }}
      dry_run:       ${{ inputs.dry_run }}
      publish_mode:  ${{ inputs.publish_mode || 'draft' }}
