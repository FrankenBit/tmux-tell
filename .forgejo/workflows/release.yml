name: release

# Consumer wrapper for frankenbit/release-toolkit (tmux-tell#617). Replaces the
# hand-rolled bump + CHANGELOG-transition + release-prep-PR machinery: a
# release-relevant push to main runs the toolkit's release-decide; a cut-worthy
# push opens/updates the rolling release-prep PR, and merging that PR cuts the
# release.
#
# publish_mode defaults to `immediate`: on release-prep-PR merge the toolkit
# publishes the release directly, Forgejo creates the tag and fires
# `release: published`, and release-publish.yml chains deploy.yml onto
# alcatraz-host (unchanged). Merge is the gate.
#
# This reverses the original draft default (#617 D1). The draft step was
# intended as an operator review window, but the review empirically moved
# upstream to PR-body inspection at merge time (e.g. the v0.27.0 Cold-Read
# damping applied to PR #687's body before merge) — the draft-then-Publish
# ceremony added no catch value it wasn't already getting at merge, so the
# de facto pattern became "operator delegates the Publish click." Immediate
# matches that practice (#701). (The "ADR-0003 Gate-3" the old comment cited
# was a phantom reference — ADR-0003 is naming; no ADR defines a "Gate-3.")
#
# The opt-back-to-draft path is preserved: pass `publish_mode: draft` via
# workflow_dispatch when a genuine draft review window is wanted — that still
# creates a DRAFT release the operator must click Publish on before deploy fires.
#
# workflow_dispatch is retained as an emergency-cut fallback for
# substrate-critical paths (operator-approved belt-and-suspenders, #617 D2).
# On a push (no inputs) publish_mode falls back to immediate.
on:
  push:
    branches: [main]
    paths-ignore: ['.release-toolkit-manifest.json']
  workflow_dispatch:
    inputs:
      bump_override:
        description: 'Override version bump (auto / patch / minor / major)'
        required: false
        default: 'auto'
        type: string
      dry_run:
        description: 'Preview only - skip remote writes, do not push or open PR'
        required: false
        default: 'false'
        type: string
      publish_mode:
        description: 'Publish mode (draft | immediate) - immediate publishes on merge (default); draft keeps the operator-Publish deploy gate'
        required: false
        default: 'immediate'
        type: string

# MINIMUM release-toolkit VERSION (#737, #844): v0.33.0+ required.
#
# v0.33.0 pulls release-toolkit#493's compose fixes: `release-prep` no longer
# drops `### Upgrade`, nor emits conventional-commit summary bullets that
# duplicate an authored fragment, when composing over pre-existing
# `## [Unreleased]` content. BOTH fired on the v0.34.0 cut (PR#830, 2026-07-22)
# — the composed body lost `### Upgrade` and carried four phantom bullets
# restating its own prose; that cut passed only because they were fixed by hand
# at review. v0.33.0 also accepts the Forgejo squash-merge subject suffix
# ` (#NN)` in PREP_SUBJECT_RE (release-toolkit#487), which the `$` anchor
# previously rejected — silently skip-gating a squash-merged prep PR.
#
# The superseded v0.32.0 floor is the same skip-gate story and still applies
# transitively: release-toolkit#450 gave PREP_SUBJECT_RE an OPTIONAL "prepare "
# prefix group — `(prepare[[:space:]]+)?` — so both `chore(release): prepare
# vX.Y.Z` and `chore(release): vX.Y.Z` fire the cut. Below that, the v0.30.0
# class re-opens (2026-07-09): release-bot emitted the short-form title, the
# workflow required the "prepare " keyword, and the cut silently no-op'd.
#
# Do NOT downgrade below v0.33.0 without verifying BOTH that the target's
# PREP_SUBJECT_RE matches the release-prep template it will run against, AND
# that its section merge preserves `### Upgrade` over pre-existing
# `## [Unreleased]` content.

jobs:
  release:
    uses: frankenbit/release-toolkit/.forgejo/workflows/reusable-release.yml@v0.33.0
    secrets: inherit
    with:
      runs_on:       go
      bump_override: ${{ inputs.bump_override }}
      dry_run:       ${{ inputs.dry_run }}
      publish_mode:  ${{ inputs.publish_mode || 'immediate' }}
